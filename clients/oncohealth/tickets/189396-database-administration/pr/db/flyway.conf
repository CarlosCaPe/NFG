# flyway.conf — Flyway configuration for newUM PostgreSQL
# Credentials are NOT stored here. They come from:
#   - Local dev: environment variables loaded from .env
#   - CI/CD:     ADO variable group 'newum-db-{env}'
#
# Override any setting via environment variable: FLYWAY_<KEY>=value
# e.g.  FLYWAY_URL=jdbc:postgresql://...
#       FLYWAY_USER=newum_migrations
#       FLYWAY_PASSWORD=...

# Location of SQL migration files (relative to project root)
flyway.locations=filesystem:db/migrations

# Name of the schema history tracking table (never change after first deploy)
flyway.table=flyway_schema_history

# Target schema
flyway.schemas=public

# --- Safety settings ---
# Never allow out-of-order migrations (prevents gaps in version sequence)
flyway.outOfOrder=false

# Validate checksums before migrating (catches tampered migration files)
flyway.validateOnMigrate=true

# HARD BLOCK: never allow flyway clean (drops entire schema — catastrophic in prod)
flyway.cleanDisabled=true

# --- Encoding ---
flyway.encoding=UTF-8

# --- Placeholders ---
# Disabled: we use ADO variable groups, not flyway placeholders
flyway.placeholderReplacement=false
